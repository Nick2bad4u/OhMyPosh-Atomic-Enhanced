name: Release Oh My Posh Themes

run-name: Release Oh My Posh Themes - ${{ github.ref }}

concurrency:
    group: release-themes-${{ github.ref }}
    cancel-in-progress: true

on:
    push:
        branches:
            - main
        paths:
            # Root theme JSONs
            - "OhMyPosh-Atomic-*.json"
            - "*_shell-*.json"
            - "1_shell*.json"
            - "slimfat*.json"
            - "atomicBit*.json"
            - "clean-detailed*.json"
            # Generated theme variants in folders
            - "1_shell/**/*.json"
            - "slimfat/**/*.json"
            - "atomic/**/*.json"
            - "atomicBit/**/*.json"
            - "cleanDetailed/**/*.json"
            - "experimentalDividers/**/*.json"
            # Palette sources / extra theme types
            - "color-palette-alternatives.json"
            - "starship-atomic-enhanced.toml"
            - "scripts/Make-NoNetwork.ps1"
            - ".github/workflows/release-themes.yml"
    workflow_dispatch:
        inputs:
            version:
                description: "Release version (e.g., v1.0.0)"
                required: true
                default: "v1.0.0"

permissions:
    contents: write

env:
    PREV_TAG: ""

jobs:
    prepare-release:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.set_version.outputs.version }}
            release_date: ${{ steps.set_version.outputs.release_date }}
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Set version and date
              id: set_version
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    VERSION="${{ github.event.inputs.version }}"
                  else
                    # Generate version from date and commit
                    VERSION="v$(date +%Y.%m.%d)-${GITHUB_SHA::7}"
                  fi
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "release_date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
                  echo "📦 Release version: $VERSION"

    build-release-assets:
        name: Build Release Assets (Windows)
        runs-on: windows-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Generate all theme variants (PowerShell)
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'

                  # Generate the 5 primary theme families into the repo root
                  pwsh -NoProfile -File .\scripts\Generate-AllThemes.ps1 -Force

                  # Generate ExperimentalDividers palette variants into .\experimentalDividers
                  pwsh -NoProfile -File .\scripts\Generate-ExperimentalDividers.ps1 -Force

                  # Ensure the NoShellIntegration variant is in sync
                  pwsh -NoProfile -File .\scripts\Make-NoShellIntegration.ps1

                  # Ensure the Fish variant is in sync
                  pwsh -NoProfile -File .\scripts\Make-FishVariant.ps1

                  # Generate "NoNetwork" offline variants (no outbound HTTP calls)
                  pwsh -NoProfile -File .\scripts\Make-NoNetwork.ps1 -SourceTheme .\OhMyPosh-Atomic-Custom.json
                  pwsh -NoProfile -File .\scripts\Make-NoNetwork.ps1 -SourceTheme .\OhMyPosh-Atomic-Custom-ExperimentalDividers.json
                  pwsh -NoProfile -File .\scripts\Make-NoNetwork.ps1 -SourceTheme .\OhMyPosh-Atomic-Custom-ExperimentalDividers.NoShellIntegration.json
                  pwsh -NoProfile -File .\scripts\Make-NoNetwork.ps1 -SourceTheme .\OhMyPosh-Atomic-Custom-ExperimentalDividers.Fish.json

            - name: Stage standalone release assets (flattened)
              shell: pwsh
              run: |
                  $ErrorActionPreference = 'Stop'

                  $dist = Join-Path -Path $PWD -ChildPath 'release-assets'
                  New-Item -ItemType Directory -Path $dist -Force | Out-Null

                  function Copy-Glob([string]$pattern) {
                    Get-ChildItem -File -Path $pattern -ErrorAction SilentlyContinue | ForEach-Object {
                      Copy-Item -LiteralPath $_.FullName -Destination $dist -Force
                    }
                  }

                  # Palette variants (theme-family folders)
                  Copy-Glob 'atomic/OhMyPosh-Atomic-Custom.*.json'
                  Copy-Glob '1_shell/1_shell-Enhanced.omp.*.json'
                  Copy-Glob 'slimfat/slimfat-Enhanced.omp.*.json'
                  Copy-Glob 'atomicBit/atomicBit-Enhanced.omp.*.json'
                  Copy-Glob 'cleanDetailed/clean-detailed-Enhanced.omp.*.json'

                  # Back-compat: if variants also exist in repo root, copy them too (folder versions win if names collide)
                  Copy-Glob 'OhMyPosh-Atomic-Custom.*.json'
                  Copy-Glob '1_shell-Enhanced.omp.*.json'
                  Copy-Glob 'slimfat-Enhanced.omp.*.json'
                  Copy-Glob 'atomicBit-Enhanced.omp.*.json'
                  Copy-Glob 'clean-detailed-Enhanced.omp.*.json'

                  # Base themes (root)
                  Copy-Glob 'OhMyPosh-Atomic-Custom.json'
                  Copy-Glob '1_shell-Enhanced.omp.json'
                  Copy-Glob 'slimfat-Enhanced.omp.json'
                  Copy-Glob 'atomicBit-Enhanced.omp.json'
                  Copy-Glob 'clean-detailed-Enhanced.omp.json'

                  # ExperimentalDividers
                  Copy-Glob 'OhMyPosh-Atomic-Custom-ExperimentalDividers.json'
                  Copy-Glob 'OhMyPosh-Atomic-Custom-ExperimentalDividers.NoShellIntegration.json'
                  Copy-Glob 'OhMyPosh-Atomic-Custom-ExperimentalDividers.Fish.json'

                  Get-ChildItem -File -Path .\experimentalDividers -Filter 'OhMyPosh-Atomic-Custom-ExperimentalDividers.*.json' -ErrorAction SilentlyContinue |
                    ForEach-Object { Copy-Item -LiteralPath $_.FullName -Destination $dist -Force }

                  # Extras
                  Copy-Glob 'color-palette-alternatives.json'
                  Copy-Glob 'starship-atomic-enhanced.toml'

                  # Repository variants intentionally use `extends` to avoid duplicating
                  # prompt structure. GitHub release downloads remain standalone and
                  # immutable by materializing each palette extension against its local
                  # root base before upload.
                  Get-ChildItem -LiteralPath $dist -Filter '*.json' -File | ForEach-Object {
                    $overlay = Get-Content -LiteralPath $_.FullName -Raw | ConvertFrom-Json -AsHashtable
                    if (-not $overlay.ContainsKey('extends') -or [string]::IsNullOrWhiteSpace($overlay.extends)) {
                      return
                    }

                    $baseName = [System.IO.Path]::GetFileName(([uri]$overlay.extends).AbsolutePath)
                    $basePath = Join-Path -Path $PWD -ChildPath $baseName
                    if (-not (Test-Path -LiteralPath $basePath)) {
                      throw "Extended base theme not found for $($_.Name): $basePath"
                    }

                    $theme = Get-Content -LiteralPath $basePath -Raw | ConvertFrom-Json -AsHashtable
                    foreach ($entry in $overlay.palette.GetEnumerator()) {
                      $theme.palette[$entry.Key] = $entry.Value
                    }

                    if ($overlay.ContainsKey('accent_color')) {
                      $theme.accent_color = $overlay.accent_color
                    }

                    [void]$theme.Remove('extends')
                    $theme | ConvertTo-Json -Depth 100 | Set-Content -LiteralPath $_.FullName -Encoding utf8
                  }

                  # Show a short inventory for debugging
                  Get-ChildItem -Path $dist -File | Sort-Object Name | Select-Object -First 25 | Format-Table Name,Length

            - name: Upload release asset bundle
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: release-assets
                  path: release-assets/
                  if-no-files-found: error
                  retention-days: 7

    create-release:
        needs:
            - prepare-release
            - build-release-assets
        runs-on: ubuntu-latest
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                  egress-policy: audit

            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Download release asset bundle
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: release-assets
                  path: release-assets

            - name: Generate changelog
              id: changelog
              run: |
                  # Generate changelog for the latest changes
                  echo "Generating changelog with git-cliff..."

                  # Get the previous tag if it exists
                  PREV_TAG=$(git tag --sort=-creatordate | head -n 1 2>/dev/null || echo "")

                  if [ -n "$PREV_TAG" ]; then
                    echo "Previous tag found: $PREV_TAG"
                    # Use git-cliff-action to generate changelog
                    echo "PREV_TAG=$PREV_TAG" >> "$GITHUB_ENV"
                  else
                    echo "No previous tag found, generating full changelog"
                    echo "PREV_TAG=" >> "$GITHUB_ENV"
                  fi

            - name: Run git-cliff
              uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
              with:
                  config: cliff.toml
                  args: ${{ env.PREV_TAG != '' && format('{0}..HEAD', env.PREV_TAG) || '' }} --strip all
              env:
                  OUTPUT: /tmp/changelog.md

            - name: Process changelog
              run: |
                  # Also save a short version (last 50 lines) for the summary
                  head -n 50 /tmp/changelog.md > /tmp/changelog-short.md

                  echo "Changelog generated successfully"
                  cat /tmp/changelog-short.md

            - name: Count theme files
              id: count_themes
              run: |
                  count_matches() {
                    local count=0
                    local file

                    for file in "$@"; do
                      if [ -f "$file" ]; then
                        count=$((count + 1))
                      fi
                    done

                    printf '%s\n' "$count"
                  }

                  count_palette_family() {
                    local base_file="$1"
                    local base_name
                    shift
                    local count=0
                    local file

                    base_name=$(basename "$base_file")

                    if [ -f "$base_file" ]; then
                      count=1
                    fi

                    for file in "$@"; do
                      if [ ! -f "$file" ]; then
                        continue
                      fi

                      case "$(basename "$file")" in
                        *NoNetwork*|*NoShellIntegration*|*Extended*|*Fish*) continue ;;
                      esac

                      if [ "$base_name" = "OhMyPosh-Atomic-Custom.json" ] &&
                         [[ "$(basename "$file")" = OhMyPosh-Atomic-Custom-ExperimentalDividers.* ]]; then
                        continue
                      fi

                      count=$((count + 1))
                    done

                    printf '%s\n' "$count"
                  }

                  ATOMIC_COUNT=$(count_palette_family release-assets/OhMyPosh-Atomic-Custom.json release-assets/OhMyPosh-Atomic-Custom.*.json)
                  SHELL_COUNT=$(count_palette_family release-assets/1_shell-Enhanced.omp.json release-assets/1_shell-Enhanced.omp.*.json)
                  SLIMFAT_COUNT=$(count_palette_family release-assets/slimfat-Enhanced.omp.json release-assets/slimfat-Enhanced.omp.*.json)
                  ATOMICBIT_COUNT=$(count_palette_family release-assets/atomicBit-Enhanced.omp.json release-assets/atomicBit-Enhanced.omp.*.json)
                  CLEAN_COUNT=$(count_palette_family release-assets/clean-detailed-Enhanced.omp.json release-assets/clean-detailed-Enhanced.omp.*.json)
                  EXPDIV_COUNT=$(count_palette_family release-assets/OhMyPosh-Atomic-Custom-ExperimentalDividers.json release-assets/OhMyPosh-Atomic-Custom-ExperimentalDividers.*.json)
                  EXPDIV_NOSI_COUNT=$(count_matches release-assets/OhMyPosh-Atomic-Custom-ExperimentalDividers.NoShellIntegration.json)

                  # Starship config isn't a theme family variant, but we ship it as an asset.
                  STARSHIP_COUNT=$(count_matches release-assets/starship-atomic-enhanced.toml)

                  TOTAL=$((ATOMIC_COUNT + SHELL_COUNT + SLIMFAT_COUNT + ATOMICBIT_COUNT + CLEAN_COUNT + EXPDIV_COUNT + EXPDIV_NOSI_COUNT))

                  {
                    echo "atomic_count=$ATOMIC_COUNT"
                    echo "shell_count=$SHELL_COUNT"
                    echo "slimfat_count=$SLIMFAT_COUNT"
                    echo "atomicbit_count=$ATOMICBIT_COUNT"
                    echo "clean_count=$CLEAN_COUNT"
                    echo "expdiv_count=$EXPDIV_COUNT"
                    echo "expdiv_nosi_count=$EXPDIV_NOSI_COUNT"
                    echo "starship_count=$STARSHIP_COUNT"
                    echo "total_count=$TOTAL"
                  } >> "$GITHUB_OUTPUT"

            - name: Generate theme lists
              id: theme_lists
              run: |
                  # Create markdown lists for each theme family
                  mkdir -p /tmp/theme-lists

                  {
                    echo "### 🚀 Atomic Custom Themes (${{ steps.count_themes.outputs.atomic_count }} variants)"
                    printf -- "- [\`%s\`](https://github.com/%s/releases/download/%s/%s) - Original palette\n" "OhMyPosh-Atomic-Custom.json" "$REPO" "$VERSION" "OhMyPosh-Atomic-Custom.json"
                    for file in release-assets/OhMyPosh-Atomic-Custom.*.json; do
                      if [ -f "$file" ]; then
                        base=$(basename "$file")
                        case "$base" in *ExperimentalDividers*|*NoNetwork*|*NoShellIntegration*|*Extended*|*Fish*) continue ;; esac
                        palette=${base#OhMyPosh-Atomic-Custom.}
                        palette=${palette%.json}
                        printf -- "- [\`%s\`](https://github.com/%s/releases/download/%s/%s) - %s palette\n" "$base" "$REPO" "$VERSION" "$base" "$palette"
                      fi
                    done
                  } > /tmp/theme-lists/atomic.md

                  {
                    echo "### ✨ 1_shell-Enhanced Themes (${{ steps.count_themes.outputs.shell_count }} variants)"
                    printf -- "- [\`%s\`](https://github.com/%s/releases/download/%s/%s) - Original palette\n" "1_shell-Enhanced.omp.json" "$REPO" "$VERSION" "1_shell-Enhanced.omp.json"
                    for file in release-assets/1_shell-Enhanced.omp.*.json; do
                      if [ -f "$file" ]; then
                        base=$(basename "$file")
                        palette=${base#1_shell-Enhanced.omp.}
                        palette=${palette%.json}
                        printf -- "- [\`%s\`](https://github.com/%s/releases/download/%s/%s) - %s palette\n" "$base" "$REPO" "$VERSION" "$base" "$palette"
                      fi
                    done
                  } > /tmp/theme-lists/shell.md

                  {
                    echo "### 🎯 Slimfat-Enhanced Themes (${{ steps.count_themes.outputs.slimfat_count }} variants)"
                    printf -- "- [\`%s\`](https://github.com/%s/releases/download/%s/%s) - Original palette\n" "slimfat-Enhanced.omp.json" "$REPO" "$VERSION" "slimfat-Enhanced.omp.json"
                    for file in release-assets/slimfat-Enhanced.omp.*.json; do
                      if [ -f "$file" ]; then
                        base=$(basename "$file")
                        palette=${base#slimfat-Enhanced.omp.}
                        palette=${palette%.json}
                        printf -- "- [\`%s\`](https://github.com/%s/releases/download/%s/%s) - %s palette\n" "$base" "$REPO" "$VERSION" "$base" "$palette"
                      fi
                    done
                  } > /tmp/theme-lists/slimfat.md

                  {
                    echo "### 📦 AtomicBit-Enhanced Themes (${{ steps.count_themes.outputs.atomicbit_count }} variants)"
                    printf -- "- [\`%s\`](https://github.com/%s/releases/download/%s/%s) - Original palette\n" "atomicBit-Enhanced.omp.json" "$REPO" "$VERSION" "atomicBit-Enhanced.omp.json"
                    for file in release-assets/atomicBit-Enhanced.omp.*.json; do
                      if [ -f "$file" ]; then
                        base=$(basename "$file")
                        palette=${base#atomicBit-Enhanced.omp.}
                        palette=${palette%.json}
                        printf -- "- [\`%s\`](https://github.com/%s/releases/download/%s/%s) - %s palette\n" "$base" "$REPO" "$VERSION" "$base" "$palette"
                      fi
                    done
                  } > /tmp/theme-lists/atomicbit.md

                  {
                    echo "### 🧹 Clean-Detailed-Enhanced Themes (${{ steps.count_themes.outputs.clean_count }} variants)"
                    printf -- "- [\`%s\`](https://github.com/%s/releases/download/%s/%s) - Original palette\n" "clean-detailed-Enhanced.omp.json" "$REPO" "$VERSION" "clean-detailed-Enhanced.omp.json"
                    for file in release-assets/clean-detailed-Enhanced.omp.*.json; do
                      if [ -f "$file" ]; then
                        base=$(basename "$file")
                        palette=${base#clean-detailed-Enhanced.omp.}
                        palette=${palette%.json}
                        printf -- "- [\`%s\`](https://github.com/%s/releases/download/%s/%s) - %s palette\n" "$base" "$REPO" "$VERSION" "$base" "$palette"
                      fi
                    done
                  } > /tmp/theme-lists/clean.md

                  {
                    echo "### 🧪 ExperimentalDividers Themes (${{ steps.count_themes.outputs.expdiv_count }} variants)"
                    printf -- "- [\`%s\`](https://github.com/%s/releases/download/%s/%s) - Original palette\n" "OhMyPosh-Atomic-Custom-ExperimentalDividers.json" "$REPO" "$VERSION" "OhMyPosh-Atomic-Custom-ExperimentalDividers.json"
                    for file in release-assets/OhMyPosh-Atomic-Custom-ExperimentalDividers.*.json; do
                      if [ -f "$file" ]; then
                        base=$(basename "$file")
                        case "$base" in *NoNetwork*|*NoShellIntegration*|*Extended*|*Fish*) continue ;; esac
                        palette=${base#OhMyPosh-Atomic-Custom-ExperimentalDividers.}
                        palette=${palette%.json}
                        printf -- "- [\`%s\`](https://github.com/%s/releases/download/%s/%s) - %s palette\n" "$base" "$REPO" "$VERSION" "$base" "$palette"
                      fi
                    done

                    if [ -f "release-assets/OhMyPosh-Atomic-Custom-ExperimentalDividers.NoShellIntegration.json" ]; then
                      echo ""
                      echo "**No Shell Integration Variant:**"
                      printf -- "- [\`%s\`](https://github.com/%s/releases/download/%s/%s)\n" "OhMyPosh-Atomic-Custom-ExperimentalDividers.NoShellIntegration.json" "$REPO" "$VERSION" "OhMyPosh-Atomic-Custom-ExperimentalDividers.NoShellIntegration.json"
                    fi
                  } > /tmp/theme-lists/experimentaldividers.md
              env:
                  REPO: ${{ github.repository }}
                  VERSION: ${{ needs.prepare-release.outputs.version }}

            - name: Build release body
              run: |
                  set -euo pipefail

                  cat <<EOF > /tmp/release-body.md
                  ## 🎨 Oh My Posh Theme Collection Release

                  **Release Date:** ${RELEASE_DATE}

                  This release contains **${TOTAL_COUNT}** Oh My Posh theme files across **6 theme families** (38 palettes each), plus a small number of special variants (e.g. NoShellIntegration).

                  ---

                  ## 📝 What's Changed

                  $(cat /tmp/changelog.md)

                  ---

                  ### 📊 Theme Statistics

                  | Theme Family | Variants | Description |
                  |--------------|----------|-------------|
                  | 🚀 **Atomic Custom** | ${ATOMIC_COUNT} | Flagship comprehensive theme with all features |
                  | ✨ **1_shell-Enhanced** | ${SHELL_COUNT} | Single-line sleek theme |
                  | 🎯 **Slimfat-Enhanced** | ${SLIMFAT_COUNT} | Two-line compact theme |
                  | 📦 **AtomicBit-Enhanced** | ${ATOMICBIT_COUNT} | Box-style technical theme |
                  | 🧹 **Clean-Detailed-Enhanced** | ${CLEAN_COUNT} | Minimalist clean theme |
                  | 🧪 **ExperimentalDividers** | ${EXPDIV_COUNT} | Experimental dividers + transitions variant |
                  | 🧪 **ExperimentalDividers (NoShellIntegration)** | ${EXPDIV_NOSI_COUNT} | Same theme with shell integration disabled |
                  | | |
                  | **Total** | **${TOTAL_COUNT}** | All theme files included |

                  ---

                  ### 🎨 Available Color Palettes

                  All themes are available in these color palettes:

                  **Classic Themes:**
                  - Original (Vibrant Tech) - Your current bright theme
                  - Nord Frost - Arctic cool tones
                  - Gruvbox Dark - Warm retro earth tones
                  - Dracula Night - Bold purple/pink
                  - Tokyo Night - Modern neon blues
                  - Monokai Pro - Classic neon colors
                  - Solarized Dark - Eye-friendly
                  - Catppuccin Mocha - Soft pastels

                  **Solid Colors:**
                  - Forest Ember - Deep greens with amber
                  - Pink Paradise - Vibrant pink/magenta 💗
                  - Purple Reign - Royal purples 👑
                  - Red Alert - Fiery reds/oranges 🔥
                  - Blue Ocean - Deep ocean blues 🌊
                  - Green Matrix - Matrix-inspired greens 💚
                  - Amber Sunset - Warm sunset tones 🌅
                  - Teal Cyan - Electric teals ⚡

                  **Festive Themes:**
                  - Rainbow Bright - ROYGBIV celebration 🌈
                  - Christmas Cheer - Festive holiday colors 🎄
                  - Halloween Spooky - Spooky theme 🎃
                  - Easter Pastel - Soft pastel colors 🐰

                  **Dual-Tone Themes:**
                  - Fire & Ice - Red/orange and blue/cyan ❄️🔥
                  - Midnight Gold - Navy blue and gold ⭐
                  - Cherry Mint - Cherry red and mint green 🍒
                  - Lavender Peach - Lavender and peach 🍑

                  ---

                  ### 🚀 Quick Install

                  To use any theme, run one of these commands:

                  \`\`\`powershell
                  # Example: Atomic Custom with Nord Frost palette
                  oh-my-posh init pwsh --config "https://github.com/${REPO}/releases/download/${VERSION}/OhMyPosh-Atomic-Custom.NordFrost.json" | Invoke-Expression

                  # Example: 1_shell-Enhanced with Tokyo Night palette
                  oh-my-posh init pwsh --config "https://github.com/${REPO}/releases/download/${VERSION}/1_shell-Enhanced.omp.TokyoNight.json" | Invoke-Expression

                  # Example: Slimfat-Enhanced with Dracula Night palette
                  oh-my-posh init pwsh --config "https://github.com/${REPO}/releases/download/${VERSION}/slimfat-Enhanced.omp.DraculaNight.json" | Invoke-Expression
                  \`\`\`

                  **For permanent installation**, add the command to your PowerShell profile: \`notepad \$PROFILE\` and paste the desired \`oh-my-posh init\` command into the file.

                  ### 📖 Documentation

                  For detailed documentation, customization guides, and feature descriptions, visit the [main README](https://github.com/${REPO}/blob/main/README.md).

                  ### 🎨 Preview Gallery

                  Check out the [Theme Gallery](https://github.com/${REPO}#-theme-gallery) in the README to see preview images of all themes.

                  ---

                  **[⭐ Star this repo](https://github.com/${REPO})** if you find these themes useful!

                  _Thank you for using **Oh My Posh Atomic Enhanced**!_
                  EOF
              env:
                  VERSION: ${{ needs.prepare-release.outputs.version }}
                  RELEASE_DATE: ${{ needs.prepare-release.outputs.release_date }}
                  TOTAL_COUNT: ${{ steps.count_themes.outputs.total_count }}
                  ATOMIC_COUNT: ${{ steps.count_themes.outputs.atomic_count }}
                  SHELL_COUNT: ${{ steps.count_themes.outputs.shell_count }}
                  SLIMFAT_COUNT: ${{ steps.count_themes.outputs.slimfat_count }}
                  ATOMICBIT_COUNT: ${{ steps.count_themes.outputs.atomicbit_count }}
                  CLEAN_COUNT: ${{ steps.count_themes.outputs.clean_count }}
                  EXPDIV_COUNT: ${{ steps.count_themes.outputs.expdiv_count }}
                  EXPDIV_NOSI_COUNT: ${{ steps.count_themes.outputs.expdiv_nosi_count }}
                  STARSHIP_COUNT: ${{ steps.count_themes.outputs.starship_count }}
                  REPO: ${{ github.repository }}

            - name: Create release with theme files
              uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
              with:
                  tag_name: ${{ needs.prepare-release.outputs.version }}
                  name: Oh My Posh Atomic Enhanced ${{ needs.prepare-release.outputs.version }}
                  body_path: /tmp/release-body.md
                  files: |
                      release-assets/*
                  preserve_order: true
                  fail_on_unmatched_files: true
                  draft: false
                  prerelease: false
                  make_latest: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Add Job Summary
              if: always()
              run: |
                  {
                    echo "## 🎨 Theme Release Summary"
                    echo ""
                    echo "### 📦 Release Details"
                    echo "- **Version:** ${{ needs.prepare-release.outputs.version }}"
                    echo "- **Date:** ${{ needs.prepare-release.outputs.release_date }}"
                    echo "- **Total Themes:** ${{ steps.count_themes.outputs.total_count }}"
                    echo ""
                    echo "### 📊 Theme Breakdown"
                    echo "- 🚀 Atomic Custom: ${{ steps.count_themes.outputs.atomic_count }} themes"
                    echo "- ✨ 1_shell-Enhanced: ${{ steps.count_themes.outputs.shell_count }} themes"
                    echo "- 🎯 Slimfat-Enhanced: ${{ steps.count_themes.outputs.slimfat_count }} themes"
                    echo "- 📦 AtomicBit-Enhanced: ${{ steps.count_themes.outputs.atomicbit_count }} themes"
                    echo "- 🧹 Clean-Detailed-Enhanced: ${{ steps.count_themes.outputs.clean_count }} themes"
                    echo "- 🧪 ExperimentalDividers: ${{ steps.count_themes.outputs.expdiv_count }} themes"
                    echo "- 🧪 ExperimentalDividers (NoShellIntegration): ${{ steps.count_themes.outputs.expdiv_nosi_count }} theme"
                    if [ "${{ steps.count_themes.outputs.starship_count }}" != "0" ]; then
                      echo "- ⭐ Starship: ${{ steps.count_themes.outputs.starship_count }} config file"
                    fi
                    echo ""
                    echo "### ✅ Status"
                    echo "Release created successfully! All theme files are now available for download."
                    echo ""
                    echo "### 🔗 Quick Links"
                    echo "- [View Release](https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare-release.outputs.version }})"
                    echo "- [Download Themes](https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare-release.outputs.version }})"
                  } >> "$GITHUB_STEP_SUMMARY"
